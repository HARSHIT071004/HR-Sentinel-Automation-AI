services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hr_sentinel
      POSTGRES_USER: hrsentinel
      POSTGRES_PASSWORD: hrsentinel123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrsentinel -d hr_sentinel"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://hrsentinel:hrsentinel123@postgres:5432/hr_sentinel
      JWT_SECRET_KEY: hr-sentinel-change-this-in-production-min-32-chars
      CORS_ORIGINS: '["http://localhost:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080/api/v1

volumes:
  postgres_data:
